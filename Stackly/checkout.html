<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly - Checkout Details</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="tastyc-theme bg-body">

    <!-- Header & Menu -->
    <header class="fixed-top tastyline-header border-bottom border-light border-opacity-10 bg-body transition-all">
        <nav class="navbar navbar-expand-lg py-3">
            <div class="container pb-3 mt-2">
                <a class="navbar-brand text-white fs-2 fw-bold" style="font-family: 'Cormorant Garamond', serif;"
                    href="index.html"><img src="assets/images/logo.webp" alt="Logo" style="height: 1.5em; vertical-align: middle; transform: translateY(-2px);">
                </a>
            </div>
        </nav>
    </header>

    <!-- Page Header -->
    <div class="page-header mt-5"
        style="background: linear-gradient(rgba(10, 11, 10, 0.8), rgba(10, 11, 10, 0.9)), url('assets/images/hero-bg.webp') center/cover; padding: 160px 0 80px; text-align: center; color: white;">
        <div class="container">
            <span class="text-primary font-heading fst-italic fs-3 d-block mb-3">Order Online</span>
            <h1 class="display-3 fw-bold text-uppercase tracking-wide">Checkout</h1>
        </div>
    </div>

    <section class="section-padding py-5">
        <div class="container py-4">
            <div class="row g-5">
                <div class="col-lg-8">
                    <!-- Billing Details -->
                    <div class="bg-light p-4 p-md-5 border border-secondary border-opacity-50">
                        <h3 class="font-heading text-white border-bottom border-secondary pb-3 mb-4">Billing Details
                        </h3>
                        <form>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label text-muted fs-7 text-uppercase tracking-wide">First
                                        Name</label>
                                    <input type="text"
                                        class="form-control bg-transparent border-secondary text-white rounded-0 py-2">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fs-7 text-uppercase tracking-wide">Last
                                        Name</label>
                                    <input type="text"
                                        class="form-control bg-transparent border-secondary text-white rounded-0 py-2">
                                </div>
                                <div class="col-12">
                                    <label class="form-label text-muted fs-7 text-uppercase tracking-wide">Street
                                        Address</label>
                                    <input type="text"
                                        class="form-control bg-transparent border-secondary text-white rounded-0 py-2 mb-3"
                                        placeholder="House number and street name">
                                    <input type="text"
                                        class="form-control bg-transparent border-secondary text-white rounded-0 py-2"
                                        placeholder="Apartment, suite, unit, etc. (optional)">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fs-7 text-uppercase tracking-wide">Phone</label>
                                    <input type="tel"
                                        class="form-control bg-transparent border-secondary text-white rounded-0 py-2">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fs-7 text-uppercase tracking-wide">Email</label>
                                    <input type="email"
                                        class="form-control bg-transparent border-secondary text-white rounded-0 py-2">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-lg-4">
                    <!-- Order Summary -->
                    <div class="bg-light p-4 border border-primary position-sticky" style="top: 120px;">
                        <h4 class="font-heading text-white border-bottom border-secondary pb-3 mb-4 text-center">Your
                            Order</h4>

                        <div class="d-flex justify-content-between mb-3 text-white">
                            <span>Beef Tartare x1</span>
                            <span class="text-primary fw-bold font-heading">$18.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3 text-white">
                            <span>Wagyu Ribeye x1</span>
                            <span class="text-primary fw-bold font-heading">$125.00</span>
                        </div>

                        <div
                            class="border-top border-secondary pt-3 mt-4 mb-3 d-flex justify-content-between text-muted fs-7 text-uppercase tracking-wide">
                            <span>Subtotal</span>
                            <span class="text-white">$143.00</span>
                        </div>
                        <div class="d-flex justify-content-between text-muted fs-7 text-uppercase tracking-wide mb-4">
                            <span>Tax (8%)</span>
                            <span class="text-white">$11.44</span>
                        </div>
                        <div class="border-top border-secondary pt-3 d-flex justify-content-between align-items-center">
                            <span class="text-white font-heading fs-5 fw-bold text-uppercase tracking-wide">Total</span>
                            <span class="text-primary font-heading fs-3 fw-bold">$154.44</span>
                        </div>

                        <button
                            class="btn btn-primary text-dark rounded-0 px-4 py-3 w-100 fs-7 text-uppercase fw-bold tracking-wide mt-5 hover-white">Place
                            Order</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-body pt-5 pb-4 mt-auto border-top border-secondary text-center">
        <div class="container pt-3 text-light opacity-50 font-base fs-7 text-uppercase tracking-wide">
            <p>&copy; 2026 Stackly Theme Clone. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
